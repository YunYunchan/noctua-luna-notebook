<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0f1a">
<title>Noctua Luna — 日々の記録帳</title>
<meta name="description" content="月に今日を預けて、また明日、笑って過ごそう。Noctua Lunaのジャーナリングアプリ。">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Noctua Luna">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <header class="app-header">
    <div class="brand">
      <span class="brand-owl" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 4C13 4 6 12 6 22c0 3 .6 5.6 1.7 7.9L5 34l6.4-1.6C13.8 36.6 18.5 40 24 40s10.2-3.4 12.6-7.6L43 34l-2.7-4.1C41.4 27.6 42 25 42 22 42 12 35 4 24 4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="16.5" cy="21" r="5" stroke="currentColor" stroke-width="2"/>
          <circle cx="31.5" cy="21" r="5" stroke="currentColor" stroke-width="2"/>
          <circle cx="16.5" cy="21" r="1.6" fill="currentColor"/>
          <circle cx="31.5" cy="21" r="1.6" fill="currentColor"/>
          <path d="M24 26.5 21.5 31h5L24 26.5Z" fill="currentColor"/>
          <path d="M17 8c1.6-2.4 4-3.6 7-3.6M31 8c-1.6-2.4-4-3.6-7-3.6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </span>
      <div class="brand-text">
        <p class="brand-title">Noctua Luna</p>
        <p class="brand-sub">日々の記録帳</p>
      </div>
      <span class="brand-moon" id="header-moon" aria-hidden="true"></span>
    </div>
  </header>

  <main id="app-content" class="app-content" aria-live="polite"></main>

  <nav class="tab-bar" id="tab-bar" aria-label="画面切り替え">
    <button class="tab-btn" data-tab="today" type="button">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </span>
      <span class="tab-label">今日</span>
    </button>
    <button class="tab-btn" data-tab="calendar" type="button">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="5" width="17" height="15" rx="2.2" stroke="currentColor" stroke-width="1.6"/><path d="M3.5 9.5h17M8 3v3.5M16 3v3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </span>
      <span class="tab-label">カレンダー</span>
    </button>
    <button class="tab-btn" data-tab="yoshuku" type="button">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/></svg>
      </span>
      <span class="tab-label">予祝</span>
    </button>
    <button class="tab-btn" data-tab="settings" type="button">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M12 3.5v2M12 18.5v2M20.5 12h-2M5.5 12h-2M17.7 6.3l-1.4 1.4M7.7 16.3l-1.4 1.4M17.7 17.7l-1.4-1.4M7.7 7.7 6.3 6.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </span>
      <span class="tab-label">設定</span>
    </button>
  </nav>
</div>

<div id="modal-root"></div>

<script src="js/storage.js"></script>
<script src="js/moon.js"></script>
<script src="js/cycle.js"></script>
<script src="js/modal.js"></script>
<script src="js/happy-fields.js"></script>
<script src="js/render-today.js"></script>
<script src="js/render-calendar.js"></script>
<script src="js/render-yoshuku.js"></script>
<script src="js/render-settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
